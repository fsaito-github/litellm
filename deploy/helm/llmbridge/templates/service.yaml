apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmbridge.fullname" . }}
  labels:
    {{- include "llmbridge.labels" . | nindent 4 }}
    {{- if .Values.monitoring.prometheus.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "4000"
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llmbridge.selectorLabels" . | nindent 4 }}
